<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brewed With Love ☕❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Poppins,sans-serif;
text-align:center;
background:linear-gradient(140deg,#ffd6e8,#ffe9d6,#fff3c8);
color:#6b3e3e;
overflow-x:hidden;
}

h1{
font-family:"Great Vibes",cursive;
font-size:36px;
margin:12px;
color:#c2185b;
}

.card{
background:rgba(255,255,255,.55);
border-radius:20px;
padding:18px;
margin:16px auto;
width:92%;
max-width:820px;
box-shadow:0 10px 30px rgba(255,105,135,.25);
}

button{
padding:14px 20px;
border:none;
border-radius:28px;
background:linear-gradient(135deg,#ff8fb1,#ffb3c7);
color:white;
font-weight:600;
margin:8px;
font-size:15px;
min-width:140px;
cursor:pointer;
}

input{
padding:14px;
border-radius:26px;
border:none;
width:220px;
max-width:80%;
}

textarea{
width:90%;
height:100px;
border-radius:16px;
padding:12px;
border:none;
font-family:Poppins;
}

.step{display:none;padding:14px;}

.swipeGallery{
display:flex;
overflow-x:auto;
gap:14px;
scroll-snap-type:x mandatory;
}
.swipeGallery img{
height:220px;
width:70%;
max-width:260px;
object-fit:cover;
border-radius:16px;
scroll-snap-align:center;
}

.fadeStory{
opacity:0;
animation:fadeInStory 1.6s ease forwards;
}
@keyframes fadeInStory{to{opacity:1;}}

.heart{position:fixed;top:-10px;animation:fall linear forwards;}
@keyframes fall{to{transform:translateY(110vh);opacity:0;}}
.confetti{position:fixed;width:8px;height:8px;top:-10px;animation:confall linear forwards;}
@keyframes confall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}
</style>
</head>

<body>

<audio id="music" loop src="main-song.mp3"></audio>
<audio id="storySong" loop src="story-song.mp3"></audio>
<audio id="hugSong" src="hug-song.mp3"></audio>

<!-- LOCK -->
<div id="lock" style="height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;">
<h1>Brewed With Love ☕❤️</h1>
<input type="password" id="pw" placeholder="Password">
<button onclick="unlock()">Unlock</button>
<p id="err"></p>
</div>

<div id="main" style="display:none;">

<div class="step" id="s1">
<h1>Coffee & You ☕💞</h1>
<div class="card">
<p id="qText"></p>
<div id="qOptions"></div>
</div>
</div>

<div class="step" id="s4">
<h1>Our Story ☕💌</h1>
<div class="card fadeStory" id="storyBox"></div>
<button onclick="nextStep()">Next ❤️</button>
</div>

<div class="step" id="s5">
<h1>Final Coffee Hug 🤗☕</h1>
<div class="card">
<button onclick="hug()">Come here</button>
<button onclick="hug()">Tight hug</button>

<div id="hugGifs" style="display:none;margin-top:18px;">
<img src="hug1.gif" width="160">
<img src="hug2.gif" width="160">
</div>

<div id="messageBox" style="display:none;margin-top:20px;">
<textarea id="hisMessage" placeholder="Write anything you want..."></textarea>
<br><br>
<button onclick="sendMessage()">Send ☕❤️</button>
<div id="savedMessages" style="margin-top:20px;"></div>
</div>

</div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* 🔥 PASTE YOUR FIREBASE CONFIG HERE */
const firebaseConfig = PASTE_YOUR_FIREBASE_KEYS_HERE;

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const music=document.getElementById("music");
const storySong=document.getElementById("storySong");
const hugSong=document.getElementById("hugSong");

function fadeOut(audio, callback){
let vol=audio.volume;
let fade=setInterval(()=>{
if(vol>0.05){vol-=0.05;audio.volume=vol;}
else{clearInterval(fade);audio.pause();audio.volume=1;if(callback)callback();}
},100);
}

function playMain(){fadeOut(storySong);fadeOut(hugSong);music.play();}
function playStory(){fadeOut(music);storySong.play();}
function playHug(){fadeOut(storySong,()=>{hugSong.play();});}

let wrongCount=0;
window.unlock=function(){
const lines=[
"Wrong key… but cute try 😌",
"Nope — but I like the confidence 😏",
"Close? Maybe. Try again, barista ji ☕😉",
"If guessing was love — you’d win already 💘",
"Password galat… intention right lag rahi hai 😄"
];

if(pw.value.toLowerCase()==="i coffee you"){
lock.style.display="none";
main.style.display="block";
music.play();
goToStep(1);
return;
}

wrongCount++;
err.innerText = wrongCount<5
? lines[(wrongCount-1)%lines.length]
: "Hint: what I feel + what you love ☕❤️";
}

let currentStep=1;
function goToStep(n){
document.querySelectorAll(".step").forEach(s=>s.style.display="none");
document.getElementById("s"+n).style.display="block";
currentStep=n;
if(n===4){playStory();showStory();}
}

window.nextStep=function(){goToStep(4);}

const fullStoryHTML = `Our story<br><br>
Sab start hua tumhari us novel-type Tinder DP se — yellow wali with goggles — sach bolu to full love-at-first-sight wala scene ho gaya tha mera 😭...`;

function showStory(){storyBox.innerHTML=fullStoryHTML;}

window.hug=function(){
playHug();
hugGifs.style.display="block";
setTimeout(()=>{messageBox.style.display="block";},1500);
}

window.sendMessage=async function(){
const message=document.getElementById("hisMessage").value.trim();
if(message==="")return;

await addDoc(collection(db,"loveMessages"),{
text:message,
createdAt:serverTimestamp()
});

document.getElementById("hisMessage").value="";
loadMessages();
}

async function loadMessages(){
const container=document.getElementById("savedMessages");
container.innerHTML="";
const q=query(collection(db,"loveMessages"),orderBy("createdAt","desc"));
const snapshot=await getDocs(q);
snapshot.forEach(doc=>{
const card=document.createElement("div");
card.style.background="rgba(255,255,255,0.6)";
card.style.padding="10px";
card.style.marginTop="10px";
card.style.borderRadius="12px";
card.innerText=doc.data().text;
container.appendChild(card);
});
}

window.addEventListener("DOMContentLoaded",loadMessages);

</script>

</body>
</html>
